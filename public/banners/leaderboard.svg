      <stop offset="0%" stop-color="#ff6b3d" stop-opacity="0.55"/>
      <stop offset="35%" stop-color="#a8351a" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#1a0a0a" stop-opacity="0"/>
